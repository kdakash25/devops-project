name: Deploy Node.js App

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_URI: 949449004484.dkr.ecr.ap-south-1.amazonaws.com/nodejs-devops
  ECS_CLUSTER: nodejs-cluster
  ECS_SERVICE: nodejs-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔥 MANUAL LOGIN (MOST RELIABLE FIX)
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin 949449004484.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Image
        run: docker build -t nodejs-devops ./app

      - name: Tag Image
        run: docker tag nodejs-devops:latest $ECR_URI:latest

      - name: Push Image
        run: docker push $ECR_URI:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deploymentname: Deploy Node.js App

